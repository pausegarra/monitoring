apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          envFrom:
            - secretRef:
                name: grafana-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: grafana-ini
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: grafana-alerting
              mountPath: /etc/grafana/provisioning/alerting/alerting.yaml
              subPath: alerting.yaml
            - name: grafana-alerting
              mountPath: /etc/grafana/provisioning/alerting/contact-points.yaml
              subPath: contact-points.yaml
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-storage
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-ini
          configMap:
            name: grafana-ini
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-alerting
          configMap:
            name: grafana-alerting
        - name: grafana-dashboards
          projected:
            sources:
              - configMap:
                  name: grafana-dashboards
                  items:
                    - key: dashboards.yaml
                      path: dashboards.yaml
                    - key: axum-rust-api.json
                      path: private/axum-rust-api.json
                    - key: cadvisor.json
                      path: private/cadvisor.json
                    - key: keycloak.json
                      path: private/keycloak.json
                    - key: logs.json
                      path: private/logs.json
              - configMap:
                  name: grafana-dashboards-2
                  items:
                    - key: quarkus-native.json
                      path: private/quarkus-native.json
                    - key: service-status.json
                      path: private/service-status.json
                    - key: sveltekit-prom-client.json
                      path: private/sveltekit-prom-client.json
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-data
