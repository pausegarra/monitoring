apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-monitoring-es-to-com
  namespace: monitoring
spec:
  redirectRegex:
    regex: ^https?://monitoring\.pausegarra\.es(.*)
    replacement: https://monitoring.pausegarra.com$1
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - monitoring.pausegarra.com
      secretName: monitoring-grafana-tls
  rules:
    - host: monitoring.pausegarra.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-svc
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress-es-redirect
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: monitoring-redirect-monitoring-es-to-com@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - monitoring.pausegarra.es
      secretName: monitoring-grafana-es-tls
  rules:
    - host: monitoring.pausegarra.es
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dummy-svc
                port:
                  number: 3000
