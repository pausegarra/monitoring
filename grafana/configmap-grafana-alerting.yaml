apiVersion: v1
data:
  alerting.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: Every minute
        folder: Private
        interval: 1m
        rules:
          - uid: af5l2frra7oxsb
            title: '[Private] % Memory usage'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: |-
                    max by (container) (container_memory_working_set_bytes{namespace="main", container!="", container!~"(blackbox-exporter|cadvisor|grafana|latticeaxissite|nginx_exporter|prometheus|alloy|loki|POD)", image!=""})
                    /
                    clamp_min(max by (container) (container_spec_memory_limit_bytes{namespace="main", container!="", container!~"(blackbox-exporter|cadvisor|grafana|latticeaxissite|nginx_exporter|prometheus|alloy|loki|POD)", image!=""}), 1)
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.8
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            isPaused: false
            notification_settings:
              receiver: Email me
          - uid: ff5l3letpid4wa
            title: '[Private] CPU % Load'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: "max by (container) (rate(container_cpu_usage_seconds_total{job=\"cadvisor\", namespace=\"main\", container!=\"\", container!~\"(blackbox-exporter|cadvisor|grafana|latticeaxissite|nginx_exporter|prometheus|alloy|loki|POD)\", image!=\"\"}[1m])) / clamp_min(\n  max by (container) (container_spec_cpu_quota{job=\"cadvisor\", namespace=\"main\", container!=\"\", container!~\"(blackbox-exporter|cadvisor|grafana|latticeaxissite|nginx_exporter|prometheus|alloy|loki|POD)\", image!=\"\"})\n  /\n  max by (container) (container_spec_cpu_period{job=\"cadvisor\", namespace=\"main\", container!=\"\", container!~\"(blackbox-exporter|cadvisor|grafana|latticeaxissite|nginx_exporter|prometheus|alloy|loki|POD)\", image!=\"\"}),\n  0.001\n)"
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.8
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            annotations: {}
            labels: {}
            isPaused: false
            notification_settings:
              receiver: Email me
          - uid: cf5l4268yh0qoa
            title: '[Private] Status'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: probe_success{instance!~"(https://latticeaxis.com|https://crossfitlambda.es)"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: ne
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            isPaused: false
            notification_settings:
              receiver: Email me

      - orgId: 1
        name: Every minute
        folder: Lattice Axis
        interval: 1m
        rules:
          - uid: bf5l4lqneo000c
            title: '[Lattice Axis] Status'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: probe_success{instance="https://latticeaxis.com"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: ne
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: [ ]
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            annotations: { }
            labels: { }
            isPaused: false
            notification_settings:
              receiver: Email Lattice
          - uid: af5l5kr8pw64gb
            title: '[Lattice Axis] % Memmory usage'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: |-
                    max by (container) (container_memory_working_set_bytes{namespace="lattice", container="lattice-site", image!=""})
                    /
                    clamp_min(max by (container) (container_spec_memory_limit_bytes{namespace="lattice", container="lattice-site", image!=""}), 1)
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.8
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: [ ]
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            annotations: { }
            labels: { }
            isPaused: false
            notification_settings:
              receiver: Email Lattice
          - uid: ef5l5rvzr63uod
            title: '[Lattice Axis] % CPU Load'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: "max by (container) (rate(container_cpu_usage_seconds_total{job=\"cadvisor\", namespace=\"lattice\", container=\"lattice-site\", image!=\"\"}[1m])) / clamp_min(\n  max by (container) (container_spec_cpu_quota{job=\"cadvisor\", namespace=\"lattice\", container=\"lattice-site\", image!=\"\"})\n  /\n  max by (container) (container_spec_cpu_period{job=\"cadvisor\", namespace=\"lattice\", container=\"lattice-site\", image!=\"\"}),\n  0.001\n)"
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.8
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            annotations: {}
            labels: {}
            isPaused: false
            notification_settings:
              receiver: Email Lattice

      - orgId: 1
        name: Every minute
        folder: Lambda
        interval: 1m
        rules:
          - uid: df5l4psv1patcd
            title: '[Lambda] Status'
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: feqjruau7xptsc
                model:
                  editorMode: code
                  expr: probe_success{instance="https://crossfitlambda.es"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: __auto
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: ne
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: [ ]
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            annotations: { }
            labels: { }
            isPaused: false
            notification_settings:
              receiver: Email Lambda
  contact-points.yaml: |-
    apiVersion: 1

    contactPoints:
      - name: Email me
        receivers:
          - uid: cer8gifzbe6m8a
            type: email
            settings:
              addresses: "pausegarra.b@gmail.com"
              singleEmail: false
            disableResolveMessage: false

      - name: Email Lattice
        receivers:
          - uid: fesvgjnugcf7kc
            type: email
            settings:
              addresses: "pausegarra.b@gmail.com, mrferrys@gmail.com"
              singleEmail: false
            disableResolveMessage: false

      - name: Email Lambda
        receivers:
          - uid: betl2bziq0v7ke
            type: email
            settings:
              addresses: "andy.szabova@gmail.com, crossfitlambda@gmail.com, pausegarra.b@gmail.com"
              singleEmail: false
