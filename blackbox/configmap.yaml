apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-cm
  namespace: monitoring
  labels:
    app: blackbox-exporter
data:
  blackbox.yaml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_status_codes: [200]
          method: GET
          preferred_ip_protocol: "ip4"
